<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title description">
  <title id="title">Hi, I'm Will.</title>
  <desc id="description">A clean, light aurora banner introducing Will, an open-source builder focused on automation and infrastructure.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#f4f9ff"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67d7ff"/>
      <stop offset="0.34" stop-color="#6fe7c4"/>
      <stop offset="0.68" stop-color="#a896ff"/>
      <stop offset="1" stop-color="#ffb6d3"/>
    </linearGradient>
    <radialGradient id="cyan-glow">
      <stop offset="0" stop-color="#7ee3ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7ee3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet-glow">
      <stop offset="0" stop-color="#b5a7ff" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#b5a7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pink-glow">
      <stop offset="0" stop-color="#ffc0da" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#ffc0da" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="panel-clip">
      <rect x="1" y="1" width="1198" height="318" rx="28"/>
    </clipPath>
  </defs>

  <rect x="1" y="1" width="1198" height="318" rx="28" fill="url(#background)" stroke="#dce8f2" stroke-width="2"/>

  <g clip-path="url(#panel-clip)">
    <circle cx="930" cy="56" r="175" fill="url(#cyan-glow)" filter="url(#blur)"/>
    <circle cx="1080" cy="170" r="185" fill="url(#violet-glow)" filter="url(#blur)"/>
    <circle cx="835" cy="292" r="155" fill="url(#pink-glow)" filter="url(#blur)"/>

    <path d="M630 264C744 155 826 102 925 101C1036 99 1087 151 1212 109" fill="none" stroke="url(#aurora)" stroke-width="34" stroke-linecap="round" opacity="0.13"/>
    <path d="M620 245C739 145 823 116 922 119C1027 122 1102 165 1214 126" fill="none" stroke="url(#aurora)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <path d="M685 294C786 209 873 184 972 189C1078 195 1137 224 1225 190" fill="none" stroke="url(#aurora)" stroke-width="2" stroke-linecap="round" opacity="0.42"/>

    <circle cx="785" cy="168" r="7" fill="#ffffff" stroke="#72dddc" stroke-width="3"/>
    <circle cx="932" cy="119" r="10" fill="#ffffff" stroke="#9d91ff" stroke-width="3"/>
    <circle cx="1098" cy="160" r="6" fill="#ffffff" stroke="#ffadc9" stroke-width="3"/>
    <circle cx="1037" cy="89" r="42" fill="#ffffff" fill-opacity="0.28" stroke="#ffffff" stroke-opacity="0.7"/>
    <circle cx="1037" cy="89" r="18" fill="url(#aurora)" fill-opacity="0.42"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="92" fill="#6b8194" font-size="18" font-weight="600" letter-spacing="3">HELLO</text>
    <text x="72" y="166" fill="#17243a" font-size="60" font-weight="750" letter-spacing="-2">Hi, I'm Will.</text>
    <text x="72" y="216" fill="#334a62" font-size="27" font-weight="500">Practical software. Fewer 3 a.m. surprises.</text>
    <text x="72" y="266" fill="#708397" font-size="17" font-weight="500" letter-spacing="0.4">Open-source builder · Automation · Infrastructure</text>
  </g>

  <g transform="translate(72 286)">
    <circle cx="0" cy="0" r="3.5" fill="#67d7ff"/>
    <circle cx="15" cy="0" r="3.5" fill="#6fe7c4"/>
    <circle cx="30" cy="0" r="3.5" fill="#a896ff"/>
    <circle cx="45" cy="0" r="3.5" fill="#ffb6d3"/>
  </g>
</svg>
